name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck -x \
            scripts/go-public \
            scripts/go-public-lib/*.sh \
            scripts/build-installer.sh \
            adapters/*.sh \
            tests/*.sh \
            setup-go-public-skill.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run fixture tests
        run: tests/test_go_public_audit.sh
      - name: Verify installer reproduces sources byte-identically
        run: tests/test_installer.sh
      - name: Self audit (expect pass on tool repo)
        run: scripts/go-public audit --dry-run --report go-public-report.json
