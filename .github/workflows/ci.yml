name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck -x \
            scripts/go-public \
            scripts/go-public-lib/*.sh \
            scripts/build-installer.sh \
            adapters/*.sh \
            tests/*.sh \
            setup-go-public-skill.sh

  test:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.21.2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run fixture tests
        run: tests/test_go_public_audit.sh
      - name: Verify installer reproduces sources byte-identically
        run: tests/test_installer.sh
      - name: Self audit (expect pass on tool repo, full secret gate with gitleaks)
        run: scripts/go-public audit --dry-run --report go-public-report.json
