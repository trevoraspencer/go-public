# go-public policy configuration.
#
# Every key below is read by the CLI (scripts/go-public-lib). Scalars are loaded
# by load_config (common.sh); list keys are parsed by yaml_list_values
# (audit.sh). Keep this file in sync with the code — unused keys were removed so
# the configuration never implies behaviour the script does not honour.

strategy: orphan
public_branch: public-main
target_branch: main

# High-confidence secret patterns scanned across full git history (ERE).
secret_patterns:
  - "ghp_[A-Za-z0-9_]{20,}"
  - "github_pat_[A-Za-z0-9_]{20,}"
  - "sk-[A-Za-z0-9_-]{20,}"
  - "AKIA[0-9A-Z]{16}"
  - "BEGIN (RSA |EC |OPENSSH |)?PRIVATE KEY"
  - "eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}"

# Allowlist for synthetic secrets (ERE). Production allowlist should stay empty.
secret_allowlist:
  - "sk-TEST-SENTINEL-.*"

gitignore_required:
  - ".env"
  - ".env.*"
  - "!.env.example"
  - "!.env.*.example"
  - "secrets.env"
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.pfx"
  - "*.log"
  - ".factory/"
  - ".cursor/plans/"
  - "notes/"
  - "scratch/"
  - "tmp/"

example_env_files:
  - .env.example
  - .env.local.example

donor_denylist:
  - SomePrivateDonorName
  - InternalCodename

audit_exclude_paths:
  - fixtures/
  - .go-public.yaml
secret_grep_exclude_paths:
  - fixtures/
  - scripts/go-public-lib/
  - .go-public.yaml
  - AGENTS.md
  - CLAUDE.md
  - .claude/
  - .cursor/
  - .gitleaks.toml
  - tests/
placeholder_exclude_paths:
  - fixtures/
  - .go-public.yaml
  - AGENTS.md
  - CLAUDE.md
  - .claude/
  - .cursor/
personal_path_exclude_paths:
  - fixtures/
  - .go-public.yaml
  - scripts/go-public-lib/
  - AGENTS.md
  - CLAUDE.md
  - .claude/
  - .cursor/
  - README.md
